name: Publish ChatGo GHCR hotfix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out hotfix source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/jjsaihub/new-api-hotfix:fix-stream-deadline-bde9b2f-20260717-r2
          labels: |
            org.opencontainers.image.source=https://github.com/JJsAIhub/new-api
            org.opencontainers.image.revision=b101a67954f9b62ffde54117d0b2b6f967997b85
            org.opencontainers.image.base.revision=bde9b2f44887d34ec54799ae191d50f97914359e
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Record image digest
        run: echo "ghcr.io/jjsaihub/new-api-hotfix@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
